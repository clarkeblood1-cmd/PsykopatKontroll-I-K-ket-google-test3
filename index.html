<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Household Next Level</title>
  <style>
    :root {
      --bg: #06111f;
      --panel: #0d1b2c;
      --panel2: #10233a;
      --text: #eaf3ff;
      --muted: #9fb4cf;
      --green: #18a34a;
      --red: #c73939;
      --line: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #020814, #071421 40%, #081829);
      color: var(--text);
      padding: 20px;
    }
    .app {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    .card {
      background: rgba(9, 19, 33, 0.95);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.24);
    }
    h1, h2 { margin: 0 0 12px; }
    p { margin: 6px 0; color: var(--muted); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    input {
      flex: 1;
      min-width: 220px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
    }
    button {
      background: var(--green);
      color: white;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #234c7a; }
    button.danger { background: var(--red); }
    .status {
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 700;
    }
    .status.ok {
      background: rgba(24,163,74,0.16);
      border: 1px solid rgba(24,163,74,0.35);
    }
    .status.error {
      background: rgba(199,57,57,0.16);
      border: 1px solid rgba(199,57,57,0.35);
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .meta-box {
      background: var(--panel2);
      border-radius: 16px;
      padding: 14px;
      border: 1px solid var(--line);
    }
    .invite-code {
      font-size: 28px;
      letter-spacing: 3px;
      font-weight: 800;
    }
    .item-list { display: grid; gap: 10px; margin-top: 12px; }
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: var(--panel2);
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
    }
    .item-row.done span { text-decoration: line-through; opacity: 0.65; }
    .item-row label {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .empty {
      color: var(--muted);
      padding: 18px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>🏠 Household Next Level</h1>
      <p>Skapa hushåll, bjud in andra med kod och dela inköpslista live.</p>
      <div id="status" class="status ok">Redo.</div>
    </div>

    <div class="card">
      <h2>Konto</h2>
      <div class="row">
        <button id="loginBtn">Logga in anonymt</button>
      </div>
      <div class="meta" style="margin-top:12px;">
        <div class="meta-box"><strong>Konto</strong><p id="accountInfo">Inte inloggad</p></div>
        <div class="meta-box"><strong>Hushåll</strong><p id="householdInfo">Inget hushåll kopplat ännu.</p></div>
      </div>
    </div>

    <div class="card">
      <h2>Skapa hushåll</h2>
      <div class="row">
        <input id="householdName" placeholder="Till exempel Familjen Johansson" />
        <button id="createHouseholdBtn">Skapa hushåll</button>
      </div>
    </div>

    <div class="card">
      <h2>Delat hushåll</h2>
      <div class="row" style="margin-bottom:12px;">
        <button id="createInviteBtn" class="secondary">Skapa inbjudningskod</button>
      </div>
      <div class="meta">
        <div class="meta-box">
          <strong>Din kod</strong>
          <div id="inviteCode" class="invite-code">-</div>
        </div>
        <div class="meta-box">
          <strong>Gå med via kod</strong>
          <div class="row" style="margin-top:10px;">
            <input id="joinCode" placeholder="Skriv kod" />
            <button id="joinBtn">Gå med</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Inköpslista</h2>
      <div class="row">
        <input id="itemName" placeholder="Lägg till vara" />
        <button id="addItemBtn">Lägg till</button>
      </div>
      <div id="itemList" class="item-list">
        <div class="empty">Skapa eller gå med i hushåll först.</div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script src="household.js"></script>
</body>
</html>
