<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Matlist" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>PsykopatKontroll i Hemmet</title>
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0d1b30;
      --panel:#11233d;
      --panel2:#132947;
      --line:rgba(255,255,255,.08);
      --text:#f6fbff;
      --muted:#a9bfd8;
      --accent:#3da4ff;
      --accent2:#77c8ff;
      --ok:#22c55e;
      --warn:#f59e0b;
      --danger:#ef4444;
      --shadow:0 16px 40px rgba(0,0,0,.35);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg),#040913);color:var(--text);font-family:Inter,Arial,Helvetica,sans-serif}
    body{min-height:100vh}
    .app{max-width:1400px;margin:0 auto;padding:16px}
    .topbar{
      position:sticky;top:0;z-index:50;
      backdrop-filter:blur(12px);
      background:rgba(7,17,31,.82);
      border-bottom:1px solid var(--line);
      margin:-16px -16px 16px;
      padding:14px 16px;
    }
    .brand{font-size:28px;font-weight:800;letter-spacing:.2px}
    .sub{color:var(--muted);font-size:13px;margin-top:4px}
    .nav{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}
    .nav button{
      background:linear-gradient(180deg,#17385c,#122945);
      color:#fff;border:1px solid rgba(255,255,255,.07);
      padding:14px;border-radius:16px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)
    }
    .nav button.active{outline:2px solid rgba(119,200,255,.45);background:linear-gradient(180deg,#1b4773,#153355)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .stat{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--line);padding:16px;border-radius:20px;box-shadow:var(--shadow)
    }
    .stat .k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.9px}
    .stat .v{font-size:28px;font-weight:800;margin-top:8px}
    .page{display:none}
    .page.active{display:block}
    .toolbar,.manageGrid,.addGrid{
      display:grid;gap:12px;margin-bottom:14px
    }
    .toolbar{grid-template-columns:1fr}
    .filterStack{display:grid;gap:12px}
    .filterRow{display:flex;gap:10px;align-items:center;min-width:0}
    .filterRail{
      position:relative;
      display:flex;
      align-items:center;
      min-width:0;
      width:100%;
      padding:0 58px;
    }
    .filterScrollerWrap{
      position:relative;
      flex:1;
      min-width:0;
      overflow:hidden;
      border-radius:18px;
    }
    .filterScrollerWrap::before,
    .filterScrollerWrap::after{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      width:38px;
      pointer-events:none;
      z-index:2;
      opacity:.98;
    }
    .filterScrollerWrap::before{
      left:0;
      background:linear-gradient(90deg, rgba(17,35,61,.98), rgba(17,35,61,0));
    }
    .filterScrollerWrap::after{
      right:0;
      background:linear-gradient(270deg, rgba(17,35,61,.98), rgba(17,35,61,0));
    }
    .filterScroller{
      display:flex;
      gap:10px;
      align-items:center;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-behavior:smooth;
      scroll-snap-type:x proximity;
      scrollbar-width:none;
      min-width:0;
      width:100%;
      padding:2px 6px;
      -webkit-overflow-scrolling:touch;
    }
    .filterScroller::-webkit-scrollbar{display:none}
    .filterNav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      z-index:3;
      border:none;
      cursor:pointer;
      width:42px;
      height:42px;
      border-radius:15px;
      font-weight:900;
      color:#f4fbff;
      background:linear-gradient(180deg,rgba(42,92,145,.92),rgba(22,47,79,.96));
      border:1px solid rgba(119,200,255,.18);
      box-shadow:0 10px 26px rgba(0,0,0,.34), 0 0 0 1px rgba(61,164,255,.10);
      backdrop-filter:blur(8px);
      transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    .filterNav:hover{transform:translateY(-50%) scale(1.04); box-shadow:0 14px 30px rgba(0,0,0,.38), 0 0 0 1px rgba(61,164,255,.18)}
    .filterNav:active{transform:translateY(-50%) scale(.98)}
    .filterNav.left{left:0}
    .filterNav.right{right:0}
    .filterChip{
      flex:0 0 auto;
      scroll-snap-align:start;
      white-space:nowrap;
      border:none;cursor:pointer;
      min-height:42px;
      padding:10px 16px;
      border-radius:16px;
      font-weight:800;
      color:#e9f4ff;
      background:linear-gradient(180deg,#17385c,#122945);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .filterChip:hover{transform:translateY(-1px)}
    .filterChip.active{
      outline:2px solid rgba(119,200,255,.35);
      border-color:rgba(61,164,255,.45);
      background:linear-gradient(180deg,#1d4f7c,#16385b);
      box-shadow:0 0 0 1px rgba(61,164,255,.15), var(--shadow);
    }
    .manageGrid{grid-template-columns:1.2fr 1fr 1fr 1fr}
    .addGrid{grid-template-columns:repeat(3,1fr)}
    .card,.section{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--line);
      border-radius:22px;padding:14px;box-shadow:var(--shadow)
    }
    .sectionTitle{font-size:18px;font-weight:800;margin:0 0 10px}
    input,select,button,textarea{
      font:inherit
    }
    input,select,textarea{
      width:100%;padding:13px 14px;border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:#0d1d33;color:#fff;outline:none
    }
    textarea{min-height:100px;resize:vertical}
    button.btn{
      border:none;border-radius:14px;padding:12px 14px;cursor:pointer;font-weight:700
    }
    .btn.primary{background:linear-gradient(180deg,var(--accent),#1e77c9);color:#fff}
    .btn.secondary{background:#193252;color:#fff;border:1px solid rgba(255,255,255,.08)}
    .btn.good{background:linear-gradient(180deg,#24cf68,#169f4c);color:#fff}
    .btn.warn{background:linear-gradient(180deg,#ffb11f,#d88909);color:#111}
    .btn.danger{background:linear-gradient(180deg,#ff6974,#d92d3a);color:#fff}
    .btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.1)}
    .btnRow{display:flex;gap:8px;flex-wrap:wrap}
    .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
    .item{
      display:flex;gap:12px;align-items:flex-start;
      background:rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.05);
      border-radius:18px;padding:12px
    }
    .thumb{
      width:88px;height:88px;border-radius:16px;background:#081221;
      border:1px solid rgba(255,255,255,.08);flex:0 0 auto;overflow:hidden;display:grid;place-items:center;cursor:pointer
    }
    .thumb img{width:100%;height:100%;object-fit:var(--image-fit, contain);object-position:center;display:block}
    .thumb .ph{font-size:12px;color:var(--muted);padding:8px;text-align:center}
    .itemBody{flex:1;min-width:0}
    .itemName{font-weight:800;font-size:18px;margin-bottom:4px}
    .meta{font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;margin:7px 0}
    .chip{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 10px;border-radius:999px;
      background:#0b1b2e;border:1px solid rgba(255,255,255,.06);font-size:12px;color:#dceeff
    }
    .qtyRow{display:flex;align-items:center;gap:8px;margin:10px 0}
    .qtyBox{font-weight:800;padding:8px 12px;border-radius:12px;background:#091624;border:1px solid rgba(255,255,255,.06)}
    .small{font-size:12px;color:var(--muted)}
    .templateTools,.entityList{display:grid;gap:8px}
    .entity{
      display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;
      background:#0b1a2d;border-radius:14px;border:1px solid rgba(255,255,255,.05)
    }
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .roomTab{
      border:none;cursor:pointer;padding:10px 14px;border-radius:999px;
      background:#102640;color:#fff
    }
    .roomTab.active{background:linear-gradient(180deg,var(--accent),#1e77c9)}
    .empty{
      padding:18px;border:1px dashed rgba(255,255,255,.12);border-radius:18px;color:var(--muted);text-align:center
    }
    .modalWrap{
      position:fixed;inset:0;background:rgba(1,6,14,.72);display:none;align-items:center;justify-content:center;padding:20px;z-index:100
    }
    .modalWrap.show{display:flex}
    .modal{
      width:min(760px,100%);max-height:90vh;overflow:auto;
      background:linear-gradient(180deg,#11233d,#10243d);border:1px solid var(--line);
      border-radius:24px;padding:16px;box-shadow:var(--shadow)
    }
    .modal.large{width:min(1000px,100%)}
    .modalHeader{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .modalTitle{font-size:20px;font-weight:800}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .imageZoomBox{width:100%;min-height:320px;height:72vh;background:#07111f;border-radius:18px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.08);overflow:hidden;position:relative;touch-action:none;user-select:none}
    .imageZoomBox img{max-width:100%;max-height:100%;object-fit:var(--modal-image-fit, contain);object-position:center;display:block;transform-origin:center center;will-change:transform}
    .footerNote{margin-top:10px;color:var(--muted);font-size:12px}
    @media (max-width: 980px){
      .stats,.toolbar,.manageGrid,.addGrid,.grid2,.grid3,.nav{grid-template-columns:1fr 1fr}
    }
    @media (max-width: 640px){
      .stats,.toolbar,.manageGrid,.addGrid,.grid2,.grid3,.nav{grid-template-columns:1fr}
      .item{flex-direction:column}
      .thumb{width:100%;height:180px}
    }
  
.restHint{font-size:12px;color:#ffd199;margin-top:6px;font-weight:700}
.restBadge{
  margin-left:8px;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
  background:linear-gradient(180deg,#ff9f1c,#ff3d00);
  color:#111;
  box-shadow:0 0 12px rgba(255,100,0,0.55), 0 0 22px rgba(255,140,0,0.25);
}

.recipeImageFrame{
  position:relative;
  border-radius:24px;
  padding:6px;
  margin-bottom:16px;
  background:linear-gradient(135deg, rgba(61,164,255,.38), rgba(0,0,0,0));
  box-shadow:0 0 0 1px rgba(61,164,255,.25), 0 20px 50px rgba(0,0,0,.6), 0 0 40px rgba(61,164,255,.18);
  overflow:hidden;
}
.recipeImageFrame.okFrame{
  box-shadow:0 0 0 1px rgba(34,197,94,.30), 0 20px 50px rgba(0,0,0,.6), 0 0 40px rgba(34,197,94,.16);
  background:linear-gradient(135deg, rgba(34,197,94,.28), rgba(0,0,0,0));
}
.recipeImageFrame.missingFrame{
  box-shadow:0 0 0 1px rgba(239,68,68,.30), 0 20px 50px rgba(0,0,0,.6), 0 0 40px rgba(239,68,68,.18);
  background:linear-gradient(135deg, rgba(239,68,68,.28), rgba(0,0,0,0));
}
.recipeHeroThumb{
  width:100%;height:240px;border-radius:20px;overflow:hidden;position:relative;cursor:pointer;
}
.recipeHeroThumb img{
  width:100%;height:100%;object-fit:var(--image-fit, contain);object-position:center;transition:transform .35s ease;display:block;
}
.recipeImageFrame:hover .recipeHeroThumb img{transform:scale(1.05)}
.recipeOverlay{
  position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:16px;
  background:linear-gradient(to top, rgba(0,0,0,.78), rgba(0,0,0,.28), transparent 62%);
}
.recipeOverlayTitle{
  font-size:22px;font-weight:900;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.8);line-height:1.1;
}
.recipeStatusBadge{
  flex:0 0 auto;align-self:flex-start;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900;letter-spacing:.2px;
  border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px);box-shadow:0 8px 20px rgba(0,0,0,.28);
}
.recipeStatusBadge.okBadge{background:rgba(34,197,94,.18);color:#d7ffe7}
.recipeStatusBadge.missingBadge{background:rgba(239,68,68,.18);color:#ffe1e1}
.recipeIngredientRow{align-items:stretch;gap:14px;flex-direction:column;padding:14px 14px 12px;background:linear-gradient(180deg,#061a31,#07182b);border:1px solid rgba(119,200,255,.10);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
.recipeIngredientMain{display:grid;grid-template-columns:64px minmax(0,1fr);align-items:start;gap:12px;width:100%}
.recipeIngredientThumb{width:64px;height:64px;border-radius:16px;flex:0 0 auto;overflow:hidden;cursor:pointer;background:#081221;border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;box-shadow:0 8px 18px rgba(0,0,0,.28)}
.recipeIngredientThumb img{width:100%;height:100%;object-fit:var(--image-fit, contain);object-position:center;display:block}
.amountRow{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.amountBox{min-width:0;padding:12px 12px 10px;border-radius:16px;background:linear-gradient(180deg,#0d2846,#0a2038);border:1px solid rgba(119,200,255,.14);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02),0 10px 22px rgba(0,0,0,.22)}
.amountBox.ok{border-color:rgba(34,197,94,.45);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02),0 0 18px rgba(34,197,94,.12)}
.amountBox.missing{border-color:rgba(239,68,68,.45);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02),0 0 18px rgba(239,68,68,.12)}
.amountLabel{font-size:11px;color:#8fc3ff;font-weight:800;letter-spacing:.9px;text-transform:uppercase}
.amountValue{margin-top:6px;font-size:20px;font-weight:900;line-height:1.05;color:#fff;word-break:break-word}
.amountUnit{display:block;margin-top:4px;font-size:13px;font-weight:700;color:#d5e8ff;opacity:.96;word-break:break-word}
.amountStatus{margin-top:10px;font-size:14px;font-weight:900;line-height:1.25}
.amountStatus.ok{color:#61f6a5;text-shadow:0 0 10px rgba(34,197,94,.18)}
.amountStatus.missing{color:#ff8d97;text-shadow:0 0 10px rgba(239,68,68,.16)}
.recipeIngredientActions{display:flex;gap:10px;flex-wrap:wrap;width:100%;justify-content:flex-start}
.recipeIngredientActions .btn{padding:10px 14px;border-radius:14px}
.recipeSummaryBar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:16px;background:linear-gradient(180deg,#0b2240,#091b31);border:1px solid rgba(255,255,255,.06);margin-top:10px}
.recipeSummaryText{font-size:14px;font-weight:800;color:#dcebff}
.recipeSummaryText strong{color:#fff}
.recipeSummaryGlow{width:14px;height:14px;border-radius:999px;box-shadow:0 0 20px currentColor,0 0 40px currentColor}
.recipeSummaryGlow.ok{color:#22c55e;background:#22c55e}
.recipeSummaryGlow.missing{color:#ef4444;background:#ef4444}
@media (max-width:700px){.amountRow{grid-template-columns:1fr}.amountValue{font-size:18px}.recipeIngredientActions .btn{flex:1 1 auto;text-align:center}}
.imageFitContain .thumb,
.imageFitContain .recipeHeroThumb,
.imageFitContain .recipeIngredientThumb,
.imageFitContain .imageZoomBox{
  --image-fit: contain;
  --modal-image-fit: contain;
  background:radial-gradient(circle at center, rgba(20,48,82,.92), rgba(7,17,31,.98));
}
.imageFitCover .thumb,
.imageFitCover .recipeHeroThumb,
.imageFitCover .recipeIngredientThumb,
.imageFitCover .imageZoomBox{
  --image-fit: cover;
  --modal-image-fit: cover;
}
.fitToggleRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fitToggleLabel{color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.zoomControlBar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-left:auto}
.zoomBadge{min-width:72px;text-align:center;padding:10px 12px;border-radius:12px;background:#0d1d33;border:1px solid rgba(255,255,255,.08);font-weight:800}

.recipeIngredientText{min-width:0}
.recipeIngredientName{font-weight:800;font-size:17px;line-height:1.2;word-break:break-word}
.recipeIngredientMeta{margin-top:6px;font-size:14px;line-height:1.35;color:var(--muted)}

.recipeSearchInputWrap{width:100%;position:relative}
.templateSuggestBox{
  position:absolute;
  top:calc(100% + 8px);
  left:0;
  right:0;
  z-index:40;
  background:linear-gradient(180deg,#0d2139,#09182b);
  border:1px solid rgba(119,200,255,.18);
  border-radius:18px;
  box-shadow:0 18px 40px rgba(0,0,0,.42);
  padding:8px;
  max-height:320px;
  overflow:auto;
}
.templateSuggestItem{
  display:grid;
  grid-template-columns:52px minmax(0,1fr);
  gap:10px;
  align-items:center;
  width:100%;
  padding:8px;
  border:none;
  border-radius:14px;
  background:transparent;
  color:#fff;
  text-align:left;
  cursor:pointer;
}
.templateSuggestItem:hover,.templateSuggestItem.active{
  background:rgba(61,164,255,.12);
}
.templateSuggestThumb{
  width:52px;height:52px;border-radius:14px;overflow:hidden;
  background:#081221;border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;
}
.templateSuggestThumb img{width:100%;height:100%;object-fit:var(--image-fit, contain);display:block}
.templateSuggestMeta{min-width:0}
.templateSuggestName{font-weight:800;font-size:14px;line-height:1.2;word-break:break-word}
.templateSuggestInfo{margin-top:3px;color:var(--muted);font-size:12px;line-height:1.25}
.templateSuggestEmpty{padding:12px;color:var(--muted);text-align:center;font-size:13px}
.recipeSuggestBox{position:absolute;top:calc(100% + 10px);left:0;right:0;z-index:40;background:linear-gradient(180deg,#0d2139,#09182b);border:1px solid rgba(119,200,255,.18);border-radius:22px;box-shadow:0 22px 52px rgba(0,0,0,.46),0 0 0 1px rgba(61,164,255,.08);padding:10px;max-height:420px;overflow:auto}
.recipeSuggestGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.recipeSuggestItem{display:grid;grid-template-columns:84px minmax(0,1fr);gap:12px;align-items:center;width:100%;padding:10px;border:1px solid rgba(255,255,255,.05);border-radius:18px;background:linear-gradient(180deg,rgba(13,34,58,.96),rgba(8,24,42,.96));color:#fff;text-align:left;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.22);transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease}
.recipeSuggestItem:hover,.recipeSuggestItem.active{background:linear-gradient(180deg,rgba(20,51,85,.98),rgba(10,28,49,.98));border-color:rgba(119,200,255,.28);box-shadow:0 16px 32px rgba(0,0,0,.28),0 0 0 1px rgba(61,164,255,.10);transform:translateY(-1px)}
.recipeSuggestThumb{width:84px;height:84px;border-radius:18px;overflow:hidden;background:radial-gradient(circle at center, rgba(20,48,82,.92), rgba(7,17,31,.98));border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;box-shadow:0 10px 22px rgba(0,0,0,.28)}
.recipeSuggestThumb img{width:100%;height:100%;object-fit:var(--image-fit, contain);display:block}
.recipeSuggestMeta{min-width:0;display:flex;align-items:center}.recipeSuggestName{font-weight:900;font-size:16px;line-height:1.15;word-break:break-word;color:#f7fbff;text-shadow:0 2px 16px rgba(0,0,0,.35)}.recipeSuggestInfo{display:none}.recipeSuggestEmpty{padding:14px;color:var(--muted);text-align:center;font-size:13px}
@media (max-width:700px){.recipeSuggestGrid{grid-template-columns:1fr}.recipeSuggestItem{grid-template-columns:72px minmax(0,1fr)}.recipeSuggestThumb{width:72px;height:72px}}
@media (max-width:900px){.manageSubnav,.manageSplitGrid{grid-template-columns:1fr}}

.recipeCardHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.recipeCardHeader .sectionTitle{
  margin:0;
}
.recipeCookHeaderBtn{
  border:none;
  cursor:pointer;
  padding:10px 14px;
  border-radius:12px;
  font-size:16px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(180deg,#24cf68,#169f4c);
  box-shadow:0 8px 20px rgba(0,0,0,.4);
}
.recipeCookHeaderBtn:hover{
  transform:scale(1.05);
}
.recipeLinkBtn{
  position:absolute;
  top:10px;
  left:10px;
  z-index:6;
  border:none;
  cursor:pointer;
  padding:10px 12px;
  border-radius:12px;

/* ===== MAX UI PREMIUM OVERRIDE ===== */
:root{
  --app-max: 940px;
  --content-max: 860px;
  --card-max: 760px;
  --surface-1: rgba(12,28,49,.86);
  --surface-2: rgba(15,36,62,.90);
  --surface-3: rgba(10,24,42,.96);
  --stroke-1: rgba(122, 194, 255, .16);
  --stroke-2: rgba(255,255,255,.06);
  --glow-1: 0 18px 50px rgba(0,0,0,.34);
  --glow-2: 0 0 0 1px rgba(61,164,255,.10), 0 16px 44px rgba(0,0,0,.24);
}

html,body{
  min-height:100%;
}
body{
  background:
    radial-gradient(circle at top center, rgba(60,125,191,.16), transparent 34%),
    radial-gradient(circle at 50% 20%, rgba(20,72,132,.10), transparent 26%),
    linear-gradient(180deg,#06101d 0%, #07111f 38%, #040913 100%);
  color:var(--text);
}

.app{
  width:min(calc(100% - 28px), var(--app-max));
  max-width:var(--app-max);
  margin:0 auto;
  padding:22px 0 38px;
}

.topbar{
  position:sticky;
  top:14px;
  width:min(100%, var(--content-max));
  margin:0 auto 18px;
  padding:18px;
  border-radius:30px;
  background:
    radial-gradient(circle at top right, rgba(122,194,255,.12), transparent 28%),
    linear-gradient(180deg, rgba(14,32,55,.92), rgba(8,20,36,.88));
  border:1px solid var(--stroke-1);
  box-shadow:0 18px 48px rgba(0,0,0,.38), inset 0 0 0 1px rgba(255,255,255,.03);

<script>
const STORAGE_KEY = "psykopatkontroll_v4_room_system_safe";

const defaultState = {
  currentPage: "home",
  currentManageRoom: "Alla rum",
  rooms: ["Köket","Badrummet","Hallen"],
  placesByRoom: {
    "Köket": ["Kyl","Frys","Kryddor","Skafferi 1"],
    "Badrummet": ["Skåp","Under handfat"],
    "Hallen": ["Hylla","Städskåp"]
  },
  drawersByRoomPlace: {
    "Köket||Kyl": ["Låda 1","Låda 2","Hyllplan 1","Hyllplan 2"],
    "Köket||Frys": ["Låda 1","Låda 2","Låda 3"],
    "Köket||Kryddor": ["Hyllplan 1"],
    "Köket||Skafferi 1": ["Hyllplan 1","Hyllplan 2"],
    "Badrummet||Skåp": ["Hyllplan 1"],
    "Badrummet||Under handfat": ["Låda 1"],
    "Hallen||Hylla": ["Hyllplan 1"],
    "Hallen||Städskåp": ["Hyllplan 1","Hyllplan 2"]
  },
  categoriesByRoom: {
    "Köket": ["Mat","Godis","Disk","Kryddor"],
    "Badrummet": ["Tvätt","Toalett","Städ"],
    "Hallen": ["Städ"]
  },
  categories: ["Mat","Godis","Disk","Tvätt","Toalett","Städ","Kryddor"],
  homeItems: [],
  buyItems: [],
  templates: [],
  recipeCategories: ["Middag"],
  recipes: [],
  draftRecipe: {ingredients: []},
  filters: {
    home: {search:"",room:"Alla rum",place:"Alla platser",drawer:"Alla lådor/hyllplan"},
    buy: {search:"",room:"Alla rum",place:"Alla platser",drawer:"Alla lådor/hyllplan"},
    add: {search:"",room:"Alla rum",place:"Alla platser"},
    recipes: {search:"",category:"Alla Recept Kategori"}
  },
  manageUi: {
    section: "home",
    roomSearch: "",
    categorySearch: "",
    placeSearch: "",
    drawerSearch: "",
    currentPlace: ""
  },
  imageFitMode: "contain"
};

const units = ["Styck","Kg","Gram","Milliliter","Liter","Kryddmått","Tesked","Matsked","Decilitermått"];
const itemModes = [{value:"normal",label:"Vanlig vara"},{value:"package",label:"Paket + fast mått"}];

let state = loadState();
migrateCategoriesByRoom();
let currentEdit = null;

function normalizeRestItems(){
  const normalizeName = (name) => String(name || "")
    .replace(/\s*\((rest|restpaket)\)\s*/gi, "")
    .replace(/\s+RESTPAKET\s*🔥?/gi, "")
    .trim();

  [...state.homeItems, ...state.buyItems].forEach(item => {
    const looksLikeRest = !!item.isRest || /restpaket|\(rest\)|\(restpaket\)/i.test(String(item.name || ""));
    if(looksLikeRest){
      item.isRest = true;
      item.name = normalizeName(item.name);
      item.mode = "package";
      item.qty = 1;
      item.packageCount = 1;
    }
  });
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return structuredClone(defaultState);
    const parsed = JSON.parse(raw);
    return mergeDeep(structuredClone(defaultState), parsed);
  }catch(e){
    return structuredClone(defaultState);
  }
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function mergeDeep(target, source){
  for(const key in source){
    if(source[key] && typeof source[key] === "object" && !Array.isArray(source[key])){
      if(!target[key] || typeof target[key] !== "object" || Array.isArray(target[key])) target[key] = {};
      mergeDeep(target[key], source[key]);
    }else{
      target[key] = source[key];
    }
  }
  return target;
}
function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}
function escapeAttr(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}
function uid(){

function getDrawers(room, place){

}

function getAllCategories(){
  var set = new Set();
  var map = state.categoriesByRoom || {};
  Object.keys(map).forEach(function(room){
    (map[room] || []).forEach(function(cat){
      if(cat) set.add(cat);
    });
  });
  return Array.from(set);
}
function ensureCategoriesForRoom(room){
  if(!room) return;
  if(!state.categoriesByRoom) state.categoriesByRoom = {};
  if(!Array.isArray(state.categoriesByRoom[room])) state.categoriesByRoom[room] = [];
}
function getCategories(room, includeAllFallback){
  if(room && room !== "Alla rum"){
    ensureCategoriesForRoom(room);
    return [].concat(state.categoriesByRoom[room]);
  }
  return includeAllFallback ? getAllCategories() : [];
}
function syncLegacyCategoriesArray(){
  state.categories = getAllCategories();
}
function migrateCategoriesByRoom(){
  if(!state.categoriesByRoom) state.categoriesByRoom = {};
  var legacy = Array.isArray(state.categories) ? state.categories.slice() : [];
  (state.rooms || []).forEach(function(room){
    ensureCategoriesForRoom(room);
    legacy.forEach(function(cat){
      if(cat && state.categoriesByRoom[room].indexOf(cat) === -1){
        state.categoriesByRoom[room].push(cat);
      }
    });
  });
  [].concat(state.homeItems || [], state.buyItems || []).forEach(function(item){
    if(item && item.room && item.category){
      ensureCategoriesForRoom(item.room);
      if(state.categoriesByRoom[item.room].indexOf(item.category) === -1){
        state.categoriesByRoom[item.room].push(item.category);
      }
    }
  });
  (state.templates || []).forEach(function(t){
    if(t && t.defaultRoom && t.category){
      ensureCategoriesForRoom(t.defaultRoom);
      if(state.categoriesByRoom[t.defaultRoom].indexOf(t.category) === -1){
        state.categoriesByRoom[t.defaultRoom].push(t.category);
      }
    }
  });
  syncLegacyCategoriesArray();
}

function formatAmount(value){
  const n = Number(value)||0;
  return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/\.00$/,"").replace(/(\.\d)0$/,"$1");
}
function getItemTotalAmount(item){
  const packageCount = Number(item.packageCount || item.qty || 0) || 0;
  const fixedAmount = Number(item.fixedAmount || 1) || 1;
  return packageCount * fixedAmount;
}

  if(item.isRest){

  }
  if(mode === "package"){

  }
  return `Antal: ${formatAmount(qty)}${unit}`;
}
function unitFamily(unit){
  const count = ["Styck"];
  const mass = ["Kg","Gram"];
  const volume = ["Liter","Milliliter","Kryddmått","Tesked","Matsked","Decilitermått"];
  if(count.includes(unit)) return "count";
  if(mass.includes(unit)) return "mass";
  if(volume.includes(unit)) return "volume";
  return "other";
}
function unitToBase(amount, unit){
  const n = Number(amount)||0;
  switch(unit){
    case "Kg": return n * 1000;
    case "Gram": return n;
    case "Liter": return n * 1000;
    case "Milliliter": return n;
    case "Kryddmått": return n * 1;
    case "Tesked": return n * 5;
    case "Matsked": return n * 15;
    case "Decilitermått": return n * 100;
    default: return n;
  }
}
function baseToUnit(amountBase, unit){
  const n = Number(amountBase)||0;
  switch(unit){
    case "Kg": return n / 1000;
    case "Gram": return n;
    case "Liter": return n / 1000;
    case "Milliliter": return n;
    case "Kryddmått": return n / 1;
    case "Tesked": return n / 5;
    case "Matsked": return n / 15;
    case "Decilitermått": return n / 100;
    default: return n;
  }
}
function canConvertUnits(fromUnit, toUnit){
  return !!fromUnit && !!toUnit && unitFamily(fromUnit) === unitFamily(toUnit);
}
function convertAmount(amount, fromUnit, toUnit){
  if(!fromUnit || !toUnit || fromUnit === toUnit) return Number(amount)||0;
  if(!canConvertUnits(fromUnit, toUnit)) return NaN;
  return baseToUnit(unitToBase(amount, fromUnit), toUnit);
}
function getHomeTotalByTemplateIdInUnit(templateId, targetUnit){
  const template = getTemplateById(templateId);
  const templateUnit = template?.unit || targetUnit || "";
  const totalInTemplateUnit = state.homeItems
    .filter(item => item.templateId === templateId)
    .reduce((sum, item) => sum + getItemTotalAmount(item), 0);

  if(!targetUnit || !templateUnit) return totalInTemplateUnit;
  const converted = convertAmount(totalInTemplateUnit, templateUnit, targetUnit);
  return Number.isNaN(converted) ? totalInTemplateUnit : converted;
}
function recipeHasEverything(recipe){
  return recipe.ingredients.every(ing => {
    const template = getTemplateById(ing.templateId);
    const homeUnit = template?.unit || "";
    const recipeUnit = ing.unit || homeUnit;
    if(recipeUnit && homeUnit && !canConvertUnits(recipeUnit, homeUnit)) return false;
    return getHomeTotalByTemplateIdInUnit(ing.templateId, recipeUnit) >= (Number(ing.amount)||0);
  });
}

function openRecipeLink(link){

function recipeMissingText(recipe){
  const missing = recipe.ingredients
    .filter(ing => {
      const template = getTemplateById(ing.templateId);
      const homeUnit = template?.unit || "";
      const recipeUnit = ing.unit || homeUnit;
      if(recipeUnit && homeUnit && !canConvertUnits(recipeUnit, homeUnit)) return true;
      return getHomeTotalByTemplateIdInUnit(ing.templateId, recipeUnit) < (Number(ing.amount)||0);
    })
    .map(ing => {
      const t = getTemplateById(ing.templateId);
      const recipeUnit = ing.unit || t?.unit || "";
      const homeUnit = t?.unit || "";
      if(recipeUnit && homeUnit && !canConvertUnits(recipeUnit, homeUnit)){
        return `${t?.name || "Saknad vara"} (fel enhet: ${recipeUnit} ↔ ${homeUnit})`;
      }
      const need = (Number(ing.amount)||0) - getHomeTotalByTemplateIdInUnit(ing.templateId, recipeUnit);
      return `${t?.name || "Saknad vara"} (${formatAmount(need)}${recipeUnit ? " " + recipeUnit : ""})`;
    });
  return missing.join(", ");
}

function getRecipeSuggestions(query){

  const withMeta = sorted.map(recipe => {

function cookRecipe(recipeId){
  const recipe = state.recipes.find(r => r.id === recipeId);
  if(!recipe) return;

  if(!recipeHasEverything(recipe)){
    alert("Du har inte allt hemma ännu.");
    return;
  }

  recipe.ingredients.forEach(ing => {
    const template = getTemplateById(ing.templateId);
    const homeUnit = template?.unit || "";
    const recipeUnit = ing.unit || homeUnit;
    let neededInHomeUnit = Number(ing.amount) || 0;
    let packagesUsedForRecipe = 0;

    if(recipeUnit && homeUnit && recipeUnit !== homeUnit){
      const converted = convertAmount(ing.amount, recipeUnit, homeUnit);
      if(Number.isNaN(converted)) return;
      neededInHomeUnit = converted;
    }

    let remaining = neededInHomeUnit;

    const matchingItems = state.homeItems
      .filter(item => item.templateId === ing.templateId)
      .sort((a, b) => {
        if(!!a.isRest !== !!b.isRest) return a.isRest ? -1 : 1;
        if((a.mode || "normal") === "package" && (b.mode || "normal") === "package"){
          return (Number(a.fixedAmount || 1) || 1) - (Number(b.fixedAmount || 1) || 1);
        }
        if((a.mode || "normal") !== (b.mode || "normal")){
          return (a.mode || "normal") === "normal" ? -1 : 1;
        }
        return 0;
      });

    for(const item of matchingItems){
      if(remaining <= 0) break;

      const mode = item.mode || "normal";
      const fixedAmount = Number(item.fixedAmount || 1) || 1;

      if(mode === "package"){
        const availablePackages = Number(item.packageCount || item.qty || 0) || 0;
        if(availablePackages <= 0) continue;

        if(template?.fixedAmount && fixedAmount === Number(template.fixedAmount || 1)){
          while(remaining > 0 && (Number(item.packageCount || item.qty || 0) || 0) > 0){
            const currentPackages = Number(item.packageCount || item.qty || 0) || 0;

            if(remaining >= fixedAmount){
              item.packageCount = currentPackages - 1;
              item.qty = item.packageCount;
              remaining -= fixedAmount;
              if(!item.isRest) packagesUsedForRecipe += 1;
            }else{
              item.packageCount = currentPackages - 1;
              item.qty = item.packageCount;

              const restAmount = fixedAmount - remaining;
              if(restAmount > 0){
                const restItem = createRestPackageItem(item, Number(restAmount.toFixed(2)));
                restItem.isRest = true;
                restItem.name = item.name || template?.name || "";
                state.homeItems.unshift(restItem);
              }
              remaining = 0;
              if(!item.isRest) packagesUsedForRecipe += 1;
            }
          }
        }else{
          const availableAmount = availablePackages * fixedAmount;
          const deductAmount = Math.min(availableAmount, remaining);
          const newPackages = (availableAmount - deductAmount) / fixedAmount;

          item.packageCount = Math.max(0, Number(newPackages.toFixed(2)));
          item.qty = item.packageCount;
          remaining -= deductAmount;
        }
      }else{
        const availableAmount = Number(item.qty || 0) || 0;
        const deductAmount = Math.min(availableAmount, remaining);

        item.qty = Math.max(0, Number((availableAmount - deductAmount).toFixed(2)));
        item.packageCount = item.qty;
        remaining -= deductAmount;
      }
    }

    if(template?.mode === "package"){
      const templateFixed = Number(template.fixedAmount || 1) || 1;

      if(packagesUsedForRecipe > 0){
        let existingWhole = state.buyItems.find(item =>
          item.templateId === ing.templateId &&
          !item.isRest &&
          (item.mode || "normal") === "package" &&
          Number(item.fixedAmount || 1) === templateFixed
        );

        if(existingWhole){
          existingWhole.packageCount = (Number(existingWhole.packageCount || existingWhole.qty || 0) || 0) + packagesUsedForRecipe;
          existingWhole.qty = existingWhole.packageCount;
          existingWhole.fixedAmount = templateFixed;
        }else{
          state.buyItems.unshift({
            id: uid(),
            templateId: ing.templateId,
            name: template?.name || "Okänd vara",
            qty: packagesUsedForRecipe,
            mode: "package",
            packageCount: packagesUsedForRecipe,
            fixedAmount: templateFixed,
            img: template?.img || "",
            category: template?.category || "",
            room: template?.defaultRoom || "",
            place: template?.defaultPlace || "",
            drawer: template?.defaultDrawer || "",
            unit: homeUnit,
            note: template?.note || "",

          });
        }
      }
    }else{
      const buyQty = Number(ing.amount) || 0;
      let existingBuy = state.buyItems.find(item => item.templateId === ing.templateId && !item.isRest);

      if(existingBuy){
        existingBuy.qty = Number((Number(existingBuy.qty || 0) + buyQty).toFixed(2));
        existingBuy.packageCount = existingBuy.qty;
        if(!existingBuy.unit) existingBuy.unit = recipeUnit || template?.unit || "";
      }else{
        state.buyItems.unshift({
          id: uid(),
          templateId: ing.templateId,
          name: template?.name || "Okänd vara",
          qty: Number(buyQty.toFixed(2)),
          mode: template?.mode || "normal",
          packageCount: Number(buyQty.toFixed(2)),
          fixedAmount: 1,
          img: template?.img || "",
          category: template?.category || "",
          room: template?.defaultRoom || "",
          place: template?.defaultPlace || "",
          drawer: template?.defaultDrawer || "",
          unit: recipeUnit || template?.unit || "",
          note: template?.note || "",

        });
      }
    }
  });

  state.homeItems = state.homeItems.filter(item => {
    if((item.mode || "normal") === "package"){
      return (Number(item.packageCount || item.qty || 0) || 0) > 0 && (Number(item.fixedAmount || 0) || 0) > 0;
    }
    return (Number(item.qty) || 0) > 0;
  });

  saveState();
  render();
  showPage("recipes");
}

function createTemplate(){
  const name = document.getElementById("new-name").value.trim();
  const mode = document.getElementById("new-mode") ? document.getElementById("new-mode").value : "normal";
  const qty = Number(document.getElementById("new-qty").value || 0);
  const img = document.getElementById("new-img").value.trim();
  const category = document.getElementById("new-category").value;
  const defaultRoom = document.getElementById("new-room").value;
  const defaultPlace = document.getElementById("new-place").value;
  const defaultDrawer = document.getElementById("new-drawer").value;
  const unit = document.getElementById("new-unit") ? document.getElementById("new-unit").value : "";
  const packageCount = Number(document.getElementById("new-package-count") ? document.getElementById("new-package-count").value : 1) || 1;
  const fixedAmount = Number(document.getElementById("new-fixed-amount") ? document.getElementById("new-fixed-amount").value : 1) || 1;
  const note = document.getElementById("new-note").value.trim();

  if(!name){
    alert("Skriv namn först.");
    return;
  }
  if(defaultRoom && category){
    ensureCategoriesForRoom(defaultRoom);
    if(state.categoriesByRoom[defaultRoom].indexOf(category) === -1){
      state.categoriesByRoom[defaultRoom].push(category);
    }
    syncLegacyCategoriesArray();
  }
  state.templates.unshift({
    id: uid(),
    name,
    qty,
    mode,
    img,
    category,
    defaultRoom,
    defaultPlace,
    defaultDrawer,
    unit,
    packageCount: mode === "package" ? packageCount : qty,
    fixedAmount: mode === "package" ? fixedAmount : 1,
    note
  });
  saveState();
  render();
  clearTemplateForm();
}

  document.getElementById("new-place").innerHTML = `<option value="">Välj plats</option>`;

  if(document.getElementById("new-package-count")) document.getElementById("new-package-count").value = "1";

  var old = keep ? categoryEl.value : "";

  var placeholder = room ? "Välj kategori" : "Välj rum först";
  categoryEl.innerHTML = `<option value="">${escapeHtml(placeholder)}</option>` + categories.map(function(c){
    return `<option value="${escapeHtml(c)}" ${old===c?'selected':''}>${escapeHtml(c)}</option>`;
  }).join("");

function addTemplateTo(target, templateId){
  const t = state.templates.find(x=>x.id===templateId);
  if(!t) return;

  const list = target === "home" ? state.homeItems : state.buyItems;
  const isPackage = (t.mode || "normal") === "package";

  let existing;
  if(target === "buy"){
    existing = list.find(item =>
      item.templateId === t.id &&
      !item.isRest &&
      (item.mode || "normal") === (t.mode || "normal") &&
      (item.unit || "") === (t.unit || "") &&
      (Number(item.fixedAmount || 1) || 1) === (isPackage ? (Number(t.fixedAmount || 1) || 1) : 1)
    );
  }else{
    existing = list.find(item =>
      item.templateId === t.id &&
      !item.isRest &&
      (item.mode || "normal") === (t.mode || "normal") &&
      (item.unit || "") === (t.unit || "") &&
      (item.room || "") === (t.defaultRoom || "") &&
      (item.place || "") === (t.defaultPlace || "") &&
      (item.drawer || "") === (t.defaultDrawer || "") &&
      (Number(item.fixedAmount || 1) || 1) === (isPackage ? (Number(t.fixedAmount || 1) || 1) : 1)
    );
  }

  if(existing){
    if(isPackage){
      existing.packageCount = (Number(existing.packageCount || existing.qty || 0) || 0) + 1;
      existing.qty = existing.packageCount;
      existing.fixedAmount = Number(t.fixedAmount || 1) || 1;
    }else{
      existing.qty = (Number(existing.qty || 0) || 0) + 1;
      existing.packageCount = existing.qty;
    }
  }else{
    const newItem = {
      id: uid(),
      templateId: t.id,
      name: t.name,
      qty: 1,
      mode: t.mode || "normal",
      packageCount: 1,
      fixedAmount: isPackage ? (Number(t.fixedAmount || 1) || 1) : 1,
      img: t.img || "",
      category: t.category || "",
      room: t.defaultRoom || "",
      place: t.defaultPlace || "",
      drawer: t.defaultDrawer || "",
      unit: t.unit || "",
      note: t.note || "",

    };
    list.unshift(newItem);
  }

  saveState();
  render();
}

function changeQty(listType, itemId, delta){
  const list = listType === "home" ? state.homeItems : state.buyItems;
  const item = list.find(x=>x.id===itemId);
  if(!item) return;

  const mode = item.mode || "normal";

  if(mode === "package"){
    // Öka/minska antal paket
    item.packageCount = Math.max(0, (Number(item.packageCount)||0) + delta);
    item.qty = item.packageCount; // håll sync
  }else{
    // Vanlig vara
    item.qty = Math.max(0, (Number(item.qty)||0) + delta);
    item.packageCount = item.qty;
  }

  if((Number(item.qty)||0) === 0 && listType === "home"){
    const shouldMove = confirm("Antal är nu 0. Flytta varan till Köpa lista?");
    if(shouldMove){
      moveItem("home", itemId);
      return;
    }
  }

  saveState();
  render();
}

function moveItem(listType, itemId){
  const fromHome = listType === "home";
  const fromList = fromHome ? state.homeItems : state.buyItems;
  const toList = fromHome ? state.buyItems : state.homeItems;

  const idx = fromList.findIndex(x => x.id === itemId);
  if(idx === -1) return;

  const item = fromList[idx];
  if(fromHome && item.isRest){
    alert("Restpaket ska stanna i Hemmet och kan inte läggas till i Köpa lista.");
    return;
  }
  const mode = item.mode || "normal";
  const template = item.templateId ? getTemplateById(item.templateId) : null;
  const templateFixedAmount = Number(template?.fixedAmount || item.fixedAmount || 1) || 1;

  let movedItem = null;

  if(mode === "package"){
    const maxPackages = Number(item.packageCount || item.qty || 0) || 0;
    if(maxPackages <= 0) return;

    item.packageCount = maxPackages - 1;
    item.qty = item.packageCount;

    movedItem = {
      ...item,
      id: uid(),
      qty: 1,
      packageCount: 1,
      fixedAmount: templateFixedAmount,
      mode: "package",
      isRest: false
    };
  }else{
    const maxQty = Number(item.qty) || 0;
    if(maxQty <= 0) return;

    item.qty = Number((maxQty - 1).toFixed(2));
    item.packageCount = item.qty;

    movedItem = {
      ...item,
      id: uid(),
      qty: 1,
      packageCount: 1,
      mode: "normal",
      isRest: false
    };
  }

  if((Number(item.qty) || 0) <= 0){
    fromList.splice(idx, 1);
  }

  let existing = null;

  if((movedItem.mode || "normal") === "package"){
    existing = toList.find(x =>
      x.templateId === movedItem.templateId &&
      (x.mode || "normal") === "package" &&
      Number(x.fixedAmount || templateFixedAmount || 1) === templateFixedAmount &&
      (!template || (
        x.room === (template.defaultRoom || movedItem.room || "") &&
        x.place === (template.defaultPlace || movedItem.place || "") &&
        x.drawer === (template.defaultDrawer || movedItem.drawer || "")
      ))
    );
  }else{
    existing = toList.find(x =>
      x.templateId === movedItem.templateId &&
      (x.room || "") === (movedItem.room || "") &&
      (x.place || "") === (movedItem.place || "") &&
      (x.drawer || "") === (movedItem.drawer || "") &&
      (x.mode || "normal") === "normal"
    );
  }

  if(existing){
    existing.qty = Number(((Number(existing.qty) || 0) + 1).toFixed(2));
    if((existing.mode || "normal") === "package"){
      existing.packageCount = Number(((Number(existing.packageCount || existing.qty || 0) || 0) + 1).toFixed(2));
      existing.fixedAmount = templateFixedAmount;
    }else{
      existing.packageCount = existing.qty;
    }
  }else{
    if(template){
      movedItem.name = template.name;
      movedItem.img = template.img || movedItem.img || "";
      movedItem.category = template.category || movedItem.category || "";
      movedItem.unit = template.unit || movedItem.unit || "";
      movedItem.room = template.defaultRoom || movedItem.room || "";
      movedItem.place = template.defaultPlace || movedItem.place || "";
      movedItem.drawer = template.defaultDrawer || movedItem.drawer || "";
      if((movedItem.mode || "normal") === "package"){
        movedItem.fixedAmount = templateFixedAmount;
      }
    }
    toList.unshift(movedItem);
  }

  saveState();
  render();
}

function syncTemplateToItems(templateId){
  if(!templateId) return;
  const template = state.templates.find(t => t.id === templateId);
  if(!template) return;

  [...state.homeItems, ...state.buyItems].forEach(entry=>{
    if(entry.templateId === templateId){
      entry.name = template.name;
      entry.img = template.img || "";
      entry.room = template.defaultRoom || "";
      entry.place = template.defaultPlace || "";
      entry.drawer = template.defaultDrawer || "";
      entry.category = template.category || "";
      entry.unit = template.unit || "";
      entry.mode = template.mode || "normal";
      entry.packageCount = Number(template.packageCount || template.qty || entry.packageCount || entry.qty || 0) || 0;
      entry.fixedAmount = Number(template.fixedAmount || entry.fixedAmount || 1) || 1;
    }
  });
}

function syncAllItemsFromTemplates(){
  [...state.homeItems, ...state.buyItems].forEach(entry=>{
    if(entry.templateId){
      const template = state.templates.find(t => t.id === entry.templateId);
      if(template){
        entry.name = template.name;
        entry.img = template.img || "";
        entry.room = template.defaultRoom || "";
        entry.place = template.defaultPlace || "";
        entry.drawer = template.defaultDrawer || "";
        entry.category = template.category || "";
        entry.unit = template.unit || "";
        entry.mode = template.mode || "normal";
        entry.packageCount = Number(template.packageCount || template.qty || entry.packageCount || entry.qty || 0) || 0;
        entry.fixedAmount = Number(template.fixedAmount || entry.fixedAmount || 1) || 1;
        entry.qty = (entry.mode === "package")
          ? (Number(entry.packageCount || entry.qty || 0) || 0)
          : (Number(entry.qty || template.qty || 0) || 0);

    }
  });

function migrateItemsToTemplateIds(){

      if(match){

      }
    }

    room: document.getElementById("edit-room").value,

    note: document.getElementById("edit-note").value.trim(),

    mode: document.getElementById("edit-mode") ? document.getElementById("edit-mode").value : "normal",

    fixedAmount: Number(document.getElementById("edit-fixed-amount") ? document.getElementById("edit-fixed-amount").value : 1) || 1
  };
  if(!payload.name){
    alert("Namn behövs.");
    return;
  }

  if(payload.room && payload.category){
    ensureCategoriesForRoom(payload.room);
    if(state.categoriesByRoom[payload.room].indexOf(payload.category) === -1){
      state.categoriesByRoom[payload.room].push(payload.category);
    }
    syncLegacyCategoriesArray();
  }

  if(currentEdit.type === "template"){
    const t = state.templates.find(x=>x.id===currentEdit.id);
    if(!t) return;

    t.name = payload.name;
    t.qty = payload.qty;

    t.category = payload.category;
    t.unit = payload.unit;

    t.mode = payload.mode;
    t.packageCount = payload.mode === "package" ? payload.packageCount : payload.qty;
    t.fixedAmount = payload.mode === "package" ? payload.fixedAmount : 1;

    syncTemplateToItems(t.id);
  }else{
    const list = currentEdit.type === "home" ? state.homeItems : state.buyItems;
    const item = list.find(x=>x.id===currentEdit.id);
    if(!item) return;

    // lokalt per post
    item.qty = payload.qty;
    item.note = payload.note;

    // kopplad till mall via ID
    if(item.templateId){
      const t = state.templates.find(x=>x.id===item.templateId);
      if(t){
        t.name = payload.name;
        t.defaultRoom = payload.room;
        t.defaultPlace = payload.place;
        t.defaultDrawer = payload.drawer;
        t.category = payload.category;
        t.unit = payload.unit;
        t.img = payload.img;
        t.mode = payload.mode;
        t.packageCount = payload.mode === "package" ? payload.packageCount : payload.qty;
        t.fixedAmount = payload.mode === "package" ? payload.fixedAmount : 1;
        syncTemplateToItems(t.id);
      }else{
        // fallback om ingen mall finns
        item.name = payload.name;
        item.room = payload.room;
        item.place = payload.place;
        item.drawer = payload.drawer;
        item.category = payload.category;
        item.unit = payload.unit;
        item.img = payload.img;
        item.mode = payload.mode;
        item.packageCount = payload.mode === "package" ? payload.packageCount : payload.qty;
        item.fixedAmount = payload.mode === "package" ? payload.fixedAmount : 1;
      }
    }else{
      // fristående post utan mallkoppling
      item.name = payload.name;
      item.room = payload.room;
      item.place = payload.place;
      item.drawer = payload.drawer;
      item.category = payload.category;
      item.unit = payload.unit;
      item.img = payload.img;
      item.mode = payload.mode;
      item.packageCount = payload.mode === "package" ? payload.packageCount : payload.qty;

let zoomLevel = 1;
let panX = 0;
let panY = 0;
let isDraggingImage = false;
let dragStartX = 0;
let dragStartY = 0;

function updateImageZoomUI(){
  const img = document.getElementById("zoomImg");
  const badge = document.getElementById("zoomPercent");
  if(badge) badge.textContent = Math.round(zoomLevel * 100) + "%";
  if(img){
    img.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
    img.style.cursor = zoomLevel > 1 ? (isDraggingImage ? "grabbing" : "grab") : "zoom-in";
  }
}

function clampImagePan(){
  if(zoomLevel <= 1){
    panX = 0;
    panY = 0;
  }
}

function setImageZoom(newZoom){
  zoomLevel = Math.min(6, Math.max(1, newZoom));
  clampImagePan();
  updateImageZoomUI();
}

function zoomInImage(){
  setImageZoom(zoomLevel + 0.25);
}

function zoomOutImage(){
  setImageZoom(zoomLevel - 0.25);
}

function resetImageZoom(){
  zoomLevel = 1;
  panX = 0;
  panY = 0;
  isDraggingImage = false;
  updateImageZoomUI();
}

function startImageDrag(clientX, clientY){
  if(zoomLevel <= 1) return;
  isDraggingImage = true;
  dragStartX = clientX - panX;
  dragStartY = clientY - panY;
  updateImageZoomUI();
}

function moveImageDrag(clientX, clientY){
  if(!isDraggingImage) return;
  panX = clientX - dragStartX;
  panY = clientY - dragStartY;
  updateImageZoomUI();
}

function endImageDrag(){
  if(!isDraggingImage) return;
  isDraggingImage = false;
  updateImageZoomUI();
}

function attachImageZoomHandlers(img){
  if(!img) return;

  img.addEventListener("wheel", (e) => {
    e.preventDefault();
    const next = e.deltaY < 0 ? zoomLevel + 0.2 : zoomLevel - 0.2;
    setImageZoom(next);
  }, { passive:false });

  img.addEventListener("dblclick", () => {
    if(zoomLevel === 1){
      setImageZoom(2);
    }else{
      resetImageZoom();
    }
  });

  img.addEventListener("mousedown", (e) => {
    e.preventDefault();
    startImageDrag(e.clientX, e.clientY);
  });

  img.addEventListener("touchstart", (e) => {
    if(e.touches.length === 1){
      const t = e.touches[0];
      startImageDrag(t.clientX, t.clientY);
    }
  }, { passive:true });

  img.addEventListener("touchmove", (e) => {
    if(e.touches.length === 1 && isDraggingImage){
      const t = e.touches[0];
      moveImageDrag(t.clientX, t.clientY);
    }
  }, { passive:true });

  img.addEventListener("touchend", () => endImageDrag());

  window.addEventListener("mousemove", handleGlobalImageMouseMove);
  window.addEventListener("mouseup", handleGlobalImageMouseUp);
}

function handleGlobalImageMouseMove(e){
  moveImageDrag(e.clientX, e.clientY);
}

function handleGlobalImageMouseUp(){
  endImageDrag();
}

function detachImageZoomHandlers(){
  window.removeEventListener("mousemove", handleGlobalImageMouseMove);
  window.removeEventListener("mouseup", handleGlobalImageMouseUp);
}

function openImageModal(src, title){
  const wrap = document.getElementById("imageModalWrap");
  const box = document.getElementById("imageZoomBox");
  if(!wrap || !box) return;

  zoomLevel = 1;
  panX = 0;
  panY = 0;
  isDraggingImage = false;

  box.innerHTML = src
    ? `<img id="zoomImg" src="${escapeHtml(src)}" alt="${escapeHtml(title || "Bild")}">`
    : `<div class="ph">Ingen bild</div>`;

  wrap.classList.add("show");

  const img = document.getElementById("zoomImg");
  attachImageZoomHandlers(img);
  updateImageZoomUI();
}

function closeImageModal(){
  const wrap = document.getElementById("imageModalWrap");
  const box = document.getElementById("imageZoomBox");
  detachImageZoomHandlers();
  if(wrap) wrap.classList.remove("show");
  if(box) box.innerHTML = "";
  zoomLevel = 1;
  panX = 0;
  panY = 0;
  isDraggingImage = false;
}

function renameRoom(oldName){
  const value = prompt("Nytt namn på rum:", oldName);
  if(!value || value.trim()===oldName) return;
  const newName = value.trim();
  if(state.rooms.includes(newName)){ alert("Det namnet finns redan."); return; }
  state.rooms = state.rooms.map(r=>r===oldName?newName:r);
  state.placesByRoom[newName] = state.placesByRoom[oldName] || [];
  delete state.placesByRoom[oldName];
  state.categoriesByRoom[newName] = state.categoriesByRoom[oldName] || [];
  delete state.categoriesByRoom[oldName];

  const newDrawers = {};
  Object.entries(state.drawersByRoomPlace).forEach(([key, arr])=>{
    const [room, place] = key.split("||");
    newDrawers[(room===oldName?newName:room)+"||"+place] = arr;
  });
  state.drawersByRoomPlace = newDrawers;

  [...state.homeItems, ...state.buyItems].forEach(item=>{ if(item.room===oldName) item.room = newName; });
  state.templates.forEach(t=>{ if(t.defaultRoom===oldName) t.defaultRoom = newName; });
  if(state.currentManageRoom===oldName) state.currentManageRoom = newName;
  const ui = getManageUi();
  if(ui.currentPlace && !getPlaces(newName).includes(ui.currentPlace)) ui.currentPlace = getPlaces(newName)[0] || "";
  saveState();
  render();
}
function deleteRoom(room){
  if(!confirm(`Ta bort rummet "${room}"? Varor i detta rum behåller tomt rum.`)) return;
  state.rooms = state.rooms.filter(r=>r!==room);
  delete state.placesByRoom[room];
  if(state.categoriesByRoom) delete state.categoriesByRoom[room];
  Object.keys(state.drawersByRoomPlace).forEach(k=>{ if(k.startsWith(room+"||")) delete state.drawersByRoomPlace[k]; });
  [...state.homeItems, ...state.buyItems].forEach(item=>{
    if(item.room===room){ item.room=""; item.place=""; item.drawer=""; }
  });
  state.templates.forEach(t=>{
    if(t.defaultRoom===room){ t.defaultRoom=""; t.defaultPlace=""; t.defaultDrawer=""; }
  });
  state.currentManageRoom = state.rooms[0] || "Alla rum";
  const ui = getManageUi();
  ui.currentPlace = getPlaces(state.currentManageRoom)[0] || "";
  saveState();
  render();
}
function addCategory(){
  var room = state.currentManageRoom && state.currentManageRoom !== "Alla rum" ? state.currentManageRoom : "";
  var input = document.getElementById("manage-new-category");
  var value = input.value.trim();
  if(!room){
    alert("Välj rum först.");
    return;
  }
  if(!value) return;
  ensureCategoriesForRoom(room);
  if(state.categoriesByRoom[room].indexOf(value) !== -1){
    alert("Kategorin finns redan i detta rum.");
    return;
  }
  state.categoriesByRoom[room].push(value);
  syncLegacyCategoriesArray();
  input.value = "";
  saveState();
  render();
}
function renameCategory(oldVal){
  var room = state.currentManageRoom && state.currentManageRoom !== "Alla rum" ? state.currentManageRoom : "";
  if(!room){
    alert("Välj rum först.");
    return;
  }
  var value = prompt("Nytt namn på kategori i " + room + ":", oldVal);
  if(!value || value.trim()===oldVal) return;
  var newVal = value.trim();
  ensureCategoriesForRoom(room);
  if(state.categoriesByRoom[room].indexOf(newVal) !== -1){
    alert("Det namnet finns redan i detta rum.");
    return;
  }
  state.categoriesByRoom[room] = state.categoriesByRoom[room].map(function(c){ return c===oldVal ? newVal : c; });
  [].concat(state.homeItems || [], state.buyItems || []).forEach(function(item){
    if(item.room === room && item.category === oldVal) item.category = newVal;
  });
  (state.templates || []).forEach(function(t){
    if(t.defaultRoom === room && t.category === oldVal) t.category = newVal;
  });
  syncLegacyCategoriesArray();
  saveState();
  render();
}
function deleteCategory(val){
  var room = state.currentManageRoom && state.currentManageRoom !== "Alla rum" ? state.currentManageRoom : "";
  if(!room){
    alert("Välj rum först.");
    return;
  }
  if(!confirm('Ta bort kategori "' + val + '" i ' + room + '?')) return;
  ensureCategoriesForRoom(room);
  state.categoriesByRoom[room] = state.categoriesByRoom[room].filter(function(c){ return c!==val; });
  [].concat(state.homeItems || [], state.buyItems || []).forEach(function(item){
    if(item.room === room && item.category === val) item.category = "";
  });
  (state.templates || []).forEach(function(t){
    if(t.defaultRoom === room && t.category === val) t.category = "";
  });
  syncLegacyCategoriesArray();
  saveState();
  render();
}
function addPlace(){
  const room = state.currentManageRoom;
  const input = document.getElementById("manage-new-place");
  const value = input.value.trim();
  if(!room || !value) return;
  state.placesByRoom[room] ||= [];
  if(state.placesByRoom[room].includes(value)){ alert("Platsen finns redan i detta rum."); return; }
  state.placesByRoom[room].push(value);
  state.drawersByRoomPlace[room+"||"+value] ||= [];
  const ui = getManageUi();
  ui.currentPlace = value;
  input.value = "";
  saveState();
  render();
}
function renamePlace(room, oldPlace){
  const value = prompt("Nytt namn på plats:", oldPlace);
  if(!value || value.trim()===oldPlace) return;
  const newPlace = value.trim();
  if((state.placesByRoom[room]||[]).includes(newPlace)){ alert("Det namnet finns redan i detta rum."); return; }
  state.placesByRoom[room] = (state.placesByRoom[room]||[]).map(p=>p===oldPlace?newPlace:p);
  const oldKey = room+"||"+oldPlace, newKey = room+"||"+newPlace;
  state.drawersByRoomPlace[newKey] = state.drawersByRoomPlace[oldKey] || [];
  delete state.drawersByRoomPlace[oldKey];
  [...state.homeItems,...state.buyItems].forEach(item=>{ if(item.room===room && item.place===oldPlace){ item.place=newPlace; } });
  state.templates.forEach(t=>{ if(t.defaultRoom===room && t.defaultPlace===oldPlace){ t.defaultPlace=newPlace; } });
  const ui = getManageUi();
  if(ui.currentPlace===oldPlace) ui.currentPlace = newPlace;
  saveState();
  render();
}
function deletePlace(room, place){
  if(!confirm(`Ta bort plats "${place}" i ${room}?`)) return;
  state.placesByRoom[room] = (state.placesByRoom[room]||[]).filter(p=>p!==place);
  delete state.drawersByRoomPlace[room+"||"+place];
  [...state.homeItems,...state.buyItems].forEach(item=>{
    if(item.room===room && item.place===place){ item.place=""; item.drawer=""; }
  });
  state.templates.forEach(t=>{
    if(t.defaultRoom===room && t.defaultPlace===place){ t.defaultPlace=""; t.defaultDrawer=""; }
  });
  const ui = getManageUi();
  if(ui.currentPlace===place) ui.currentPlace = (state.placesByRoom[room]||[])[0] || "";
  saveState();
  render();
}
function addDrawer(room, place, inputId){
  const input = document.getElementById(inputId);
  const value = input.value.trim();
  if(!value) return;
  const key = room+"||"+place;
  state.drawersByRoomPlace[key] ||= [];
  if(state.drawersByRoomPlace[key].includes(value)){ alert("Finns redan."); return; }
  state.drawersByRoomPlace[key].push(value);
  input.value = "";
  saveState();
  render();
}
function renameDrawer(room, place, oldVal){
  const value = prompt("Nytt namn på låda / hyllplan:", oldVal);
  if(!value || value.trim()===oldVal) return;
  const newVal = value.trim();
  const key = room+"||"+place;
  if((state.drawersByRoomPlace[key]||[]).includes(newVal)){ alert("Det namnet finns redan här."); return; }
  state.drawersByRoomPlace[key] = (state.drawersByRoomPlace[key]||[]).map(d=>d===oldVal?newVal:d);
  [...state.homeItems,...state.buyItems].forEach(item=>{
    if(item.room===room && item.place===place && item.drawer===oldVal) item.drawer=newVal;
  });
  state.templates.forEach(t=>{
    if(t.defaultRoom===room && t.defaultPlace===place && t.defaultDrawer===oldVal) t.defaultDrawer=newVal;
  });
  saveState();
  render();
}
function deleteDrawer(room, place, val){
  if(!confirm(`Ta bort "${val}"?`)) return;
  const key = room+"||"+place;
  state.drawersByRoomPlace[key] = (state.drawersByRoomPlace[key]||[]).filter(d=>d!==val);
  [...state.homeItems,...state.buyItems].forEach(item=>{
    if(item.room===room && item.place===place && item.drawer===val) item.drawer="";
  });
  state.templates.forEach(t=>{
    if(t.defaultRoom===room && t.defaultPlace===place && t.defaultDrawer===val) t.defaultDrawer="";
  });
  saveState();
  render();
}
